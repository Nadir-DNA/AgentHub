name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v3
        id: pnpm
        with:
          version: 8
      - run: npm install

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentHub ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  latest-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate latest.json
        run: |
          cat > latest.json << 'EOF'
          {
            "version": "${{ github.ref_name }}",
            "notes": "AgentHub ${{ github.ref_name }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": { "signature": "", "url": "https://github.com/Nadir-DNA/AgentHub/releases/download/${{ github.ref_name }}/agenthub_${{ github.ref_name }}_amd64.AppImage" },
              "windows-x86_64": { "signature": "", "url": "https://github.com/Nadir-DNA/AgentHub/releases/download/${{ github.ref_name }}/agenthub_${{ github.ref_name }}_x64-setup.exe" },
              "darwin-aarch64": { "signature": "", "url": "https://github.com/Nadir-DNA/AgentHub/releases/download/${{ github.ref_name }}/agenthub_${{ github.ref_name }}_aarch64.dmg" },
              "darwin-x86_64": { "signature": "", "url": "https://github.com/Nadir-DNA/AgentHub/releases/download/${{ github.ref_name }}/agenthub_${{ github.ref_name }}_x64.dmg" }
            }
          }
          EOF
      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}