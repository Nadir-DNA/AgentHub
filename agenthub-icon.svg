<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer glow -->
  <polygon points="256,60 380,130 380,280 256,350 132,280 132,130" fill="url(#glow)"/>

  <!-- Hexagon body -->
  <polygon points="256,80 370,145 370,280 256,345 142,280 142,145" fill="none" stroke="url(#hex)" stroke-width="6"/>

  <!-- Inner hexagon -->
  <polygon points="256,120 340,168 340,264 256,312 172,264 172,168" fill="url(#hex)" opacity="0.9"/>

  <!-- Brain/network dot center -->
  <circle cx="256" cy="216" r="24" fill="#0a0a0a"/>
  <circle cx="256" cy="216" r="12" fill="#A78BFA"/>

  <!-- Network lines connecting to hex vertices -->
  <line x1="256" y1="216" x2="256" y2="120" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="216" x2="340" y2="168" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="216" x2="340" y2="264" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="216" x2="256" y2="312" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="216" x2="172" y2="264" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="216" x2="172" y2="168" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>

  <!-- Small nodes on network -->
  <circle cx="256" cy="120" r="5" fill="#60A5FA"/>
  <circle cx="340" cy="168" r="5" fill="#60A5FA"/>
  <circle cx="340" cy="264" r="5" fill="#60A5FA"/>
  <circle cx="256" cy="312" r="5" fill="#60A5FA"/>
  <circle cx="172" cy="264" r="5" fill="#60A5FA"/>
  <circle cx="172" cy="168" r="5" fill="#60A5FA"/>

  <!-- Subtle orbit ring -->
  <ellipse cx="256" cy="216" rx="90" ry="30" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3" transform="rotate(30 256 216)"/>

  <!-- Small stars -->
  <circle cx="120" cy="100" r="2" fill="white" opacity="0.4"/>
  <circle cx="400" cy="80" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="100" cy="350" r="2" fill="white" opacity="0.5"/>
  <circle cx="420" cy="380" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="160" cy="420" r="1" fill="white" opacity="0.4"/>
  <circle cx="380" cy="150" r="1.5" fill="white" opacity="0.3"/>
</svg>
