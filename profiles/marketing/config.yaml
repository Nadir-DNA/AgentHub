# Config Hermes — Profile Marketing
# Réseaux sociaux, avis Google, SEO, contenu

model:
  default: deepseek-v4-flash
  fallbacks:
    - grok-3
    - gpt-4o-mini

tools:
  enabled:
    - web_search
    - browser
    - memory
  disabled:
    - terminal

  gateways:
    - telegram
    - whatsapp

memory:
  persistent: true
  scope: profile

scheduling:
  enabled: true
  timezone: Europe/Paris
